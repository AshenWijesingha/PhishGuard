name: Deploy learning site to GitHub Pages

# Publishes the standalone index.html landing/learning page to GitHub Pages.
# Uses configure-pages with enablement so Pages is turned on automatically
# the first time this runs (no manual repo-settings step required).

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          # Friendly 404 falls back to the landing page.
          cp index.html _site/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
