name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit & integration tests
        run: npm test
      - name: Build extension
        run: npm run build
      - name: Upload load-unpacked bundle
        uses: actions/upload-artifact@v4
        with:
          name: phishguard-dist
          path: dist/
